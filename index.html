<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
<title>Composition Lab</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { height: 100%; overflow: hidden; }
  body {
    background: #0a0a0a; color: #e8e4dd;
    font-family: 'JetBrains Mono', monospace;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    position: fixed; inset: 0;
    -webkit-user-select: none; user-select: none;
  }

  /* subtle lattice bg */
  body::before {
    content: ''; position: absolute; inset: 0; opacity: 0.04;
    background-image:
      linear-gradient(60deg, #d4912a 1px, transparent 1px),
      linear-gradient(-60deg, #d4912a 1px, transparent 1px),
      linear-gradient(0deg, #d4912a 1px, transparent 1px);
    background-size: 40px 69px;
    pointer-events: none;
  }

  .container {
    display: flex; flex-direction: column; align-items: center;
    gap: 48px; position: relative; z-index: 1; width: 100%;
    max-width: 400px; padding: 0 24px;
  }

  .title {
    font-weight: 700; font-size: clamp(20px, 5vw, 32px);
    letter-spacing: 3px; text-align: center;
    background: linear-gradient(135deg, #e8e4dd 30%, #d4912a 100%);
    -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
  }

  .menu { display: flex; flex-direction: column; gap: 2px; width: 100%; }

  .menu-item {
    display: flex; align-items: center; gap: 16px;
    padding: 18px 20px; background: #111;
    border: 1px solid #1a1a1a;
    cursor: pointer; transition: all 0.25s;
    text-decoration: none; color: #e8e4dd;
  }
  .menu-item:first-child { border-radius: 12px 12px 0 0; }
  .menu-item:last-child { border-radius: 0 0 12px 12px; }
  .menu-item:hover { background: #161616; border-color: #d4912a; }
  .menu-item:active { transform: scale(0.99); }

  .menu-item.disabled {
    opacity: 0.3; cursor: not-allowed;
    pointer-events: none;
  }

  .menu-icon {
    width: 36px; height: 36px; flex-shrink: 0;
    display: flex; align-items: center; justify-content: center;
    font-size: 16px; color: #888;
    background: #1a1a1a; border-radius: 8px;
    border: 1px solid #222;
    transition: all 0.25s;
  }
  .menu-item:hover .menu-icon { border-color: #d4912a; color: #d4912a; }

  .menu-icon svg { width: 18px; height: 18px; fill: currentColor; }

  .menu-label {
    font-size: 13px; font-weight: 600; letter-spacing: 1px;
  }

  .menu-badge {
    margin-left: auto; font-size: 9px; font-weight: 500;
    letter-spacing: 0.5px; color: #555;
    padding: 3px 8px; border-radius: 4px;
    border: 1px solid #222; background: #0e0e0e;
  }

  .menu-arrow {
    margin-left: auto; color: #333; font-size: 16px;
    transition: color 0.25s;
  }
  .menu-item:hover .menu-arrow { color: #d4912a; }

  .footer {
    font-size: 11px; font-weight: 400;
    letter-spacing: 1.5px; color: #444;
  }

  /* view toggle */
  .view-toggle {
    position: fixed; top: 12px; right: 12px; z-index: 100;
    width: 32px; height: 32px; border-radius: 8px;
    border: 1px solid #222; background: #111;
    color: #555; cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    transition: all 0.2s;
  }
  .view-toggle:hover { border-color: #d4912a; color: #d4912a; }
  .view-toggle svg { width: 16px; height: 16px; fill: currentColor; }
</style>
</head>
<body>

  <div class="container">
    <div class="title">COMPOSITION LAB</div>

    <nav class="menu">
      <a class="menu-item" href="tonnetz.html" id="linkTonnetz">
        <div class="menu-icon">
          <svg viewBox="0 0 24 24"><path d="M12 2L2 19h20L12 2zm0 4l7 12H5l7-12z"/></svg>
        </div>
        <span class="menu-label">TONNETZ TONE ROW</span>
        <span class="menu-arrow">›</span>
      </a>
      <a class="menu-item" href="morse.html" id="linkMorse">
        <div class="menu-icon">·—</div>
        <span class="menu-label">MORSE SEQ</span>
        <span class="menu-arrow">›</span>
      </a>
      <div class="menu-item disabled">
        <div class="menu-icon">⠃</div>
        <span class="menu-label">BRAILLE SEQ</span>
        <span class="menu-badge">COMING SOON</span>
      </div>
    </nav>

    <div class="footer">EDMUND SONG</div>
  </div>

  <button class="view-toggle" id="viewToggle" title="Toggle mobile/desktop view">
    <svg id="icoPhone" viewBox="0 0 24 24"><path d="M7 1h10a2 2 0 012 2v18a2 2 0 01-2 2H7a2 2 0 01-2-2V3a2 2 0 012-2zm0 2v14h10V3H7zm3 16h4v1h-4v-1z"/></svg>
    <svg id="icoDesktop" viewBox="0 0 24 24" style="display:none"><path d="M3 4h18a1 1 0 011 1v11a1 1 0 01-1 1H3a1 1 0 01-1-1V5a1 1 0 011-1zm1 2v9h16V6H4zm4 13h8v1H8v-1z"/></svg>
  </button>

  <script>
    // View preference: auto, mobile, or desktop
    const params = new URLSearchParams(window.location.search);
    let viewPref = params.get('view') || 'auto';
    const isMobile = window.innerWidth <= 768;
    
    function updateToggleIcon() {
      const showingMobile = viewPref === 'mobile' || (viewPref === 'auto' && isMobile);
      document.getElementById('icoPhone').style.display = showingMobile ? 'block' : 'none';
      document.getElementById('icoDesktop').style.display = showingMobile ? 'none' : 'block';
    }
    
    function updateLinks() {
      const suffix = viewPref === 'auto' ? '' : '?view=' + viewPref;
      document.getElementById('linkTonnetz').href = 'tonnetz.html' + suffix;
      document.getElementById('linkMorse').href = 'morse.html' + suffix;
    }
    
    document.getElementById('viewToggle').onclick = () => {
      const currentlyMobile = viewPref === 'mobile' || (viewPref === 'auto' && isMobile);
      viewPref = currentlyMobile ? 'desktop' : 'mobile';
      updateToggleIcon();
      updateLinks();
    };
    
    updateToggleIcon();
    updateLinks();
  </script>

</body>
</html>

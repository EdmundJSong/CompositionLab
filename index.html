<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
  <title>Composition Lab</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link
    href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600;700&display=swap"
    rel="stylesheet">
  <style>
    *,
    *::before,
    *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      --bg: #0a0a0a;
      --surface: #111;
      --surface2: #161616;
      --border: #222;
      --text: #e8e4dd;
      --text2: #888;
      --text3: #555;
      --amber: #d4912a;
      --amber-dim: rgba(212, 145, 42, 0.12);
      --amber-glow: rgba(212, 145, 42, 0.35);
    }

    html,
    body {
      height: 100%;
      overflow: hidden;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Inter', system-ui, -apple-system, sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      position: fixed;
      inset: 0;
      -webkit-user-select: none;
      user-select: none;
    }

    /* Subtle background glow effect */
    body::before {
      content: '';
      position: absolute;
      top: 50%;
      left: 50%;
      width: 600px;
      height: 600px;
      transform: translate(-50%, -50%);
      background: radial-gradient(circle, var(--amber-dim) 0%, transparent 60%);
      pointer-events: none;
      z-index: 0;
      opacity: 0.5;
    }

    .container {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 40px;
      position: relative;
      z-index: 1;
      width: 100%;
      max-width: 440px;
      padding: 0 24px;
    }

    .title {
      font-family: 'JetBrains Mono', monospace;
      font-weight: 700;
      font-size: clamp(24px, 6vw, 36px);
      letter-spacing: 4px;
      text-align: center;
      color: var(--text);
      text-shadow: 0 2px 10px rgba(232, 228, 221, 0.1);
      position: relative;
      display: inline-block;
    }

    .title::after {
      content: '';
      position: absolute;
      bottom: -10px;
      left: 50%;
      transform: translateX(-50%);
      width: 40px;
      height: 2px;
      background: var(--amber);
      border-radius: 1px;
      box-shadow: 0 0 10px var(--amber-glow);
    }

    .title-desc {
      font-size: 13px;
      font-weight: 400;
      color: var(--text2);
      text-align: center;
      margin-top: -24px;
      letter-spacing: 0.5px;
    }

    .menu {
      display: flex;
      flex-direction: column;
      gap: 12px;
      width: 100%;
    }

    .menu-item {
      display: flex;
      align-items: center;
      gap: 16px;
      padding: 18px 20px;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 12px;
      cursor: pointer;
      transition: all 0.25s cubic-bezier(0.2, 0.8, 0.2, 1);
      text-decoration: none;
      color: var(--text);
      position: relative;
      overflow: hidden;
    }

    .menu-item::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      width: 3px;
      height: 100%;
      background: var(--amber);
      transform: scaleY(0);
      transform-origin: bottom;
      transition: transform 0.25s cubic-bezier(0.2, 0.8, 0.2, 1);
      box-shadow: 0 0 10px var(--amber-glow);
    }

    .menu-item:hover {
      background: var(--surface);
      border-color: rgba(212, 145, 42, 0.4);
      transform: translateY(-2px);
      box-shadow: 0 8px 24px rgba(0, 0, 0, 0.4);
    }

    .menu-item:hover::before {
      transform: scaleY(1);
    }

    .menu-item:active {
      transform: scale(0.98) translateY(0);
    }

    .menu-icon {
      width: 40px;
      height: 40px;
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'JetBrains Mono', monospace;
      font-size: 18px;
      font-weight: 600;
      color: var(--text2);
      background: var(--bg);
      border-radius: 8px;
      border: 1px solid var(--border);
      transition: all 0.2s ease;
    }

    .menu-item:hover .menu-icon {
      border-color: var(--amber);
      color: var(--amber);
      background: var(--amber-dim);
      box-shadow: 0 0 12px var(--amber-glow);
    }

    .menu-icon svg {
      width: 20px;
      height: 20px;
      fill: currentColor;
    }

    .menu-text-block {
      display: flex;
      flex-direction: column;
      gap: 6px;
      flex-grow: 1;
    }

    .menu-label {
      font-family: 'JetBrains Mono', monospace;
      font-size: 15px;
      font-weight: 600;
      letter-spacing: 1px;
    }

    .menu-desc {
      font-size: 12px;
      font-weight: 400;
      color: var(--text2);
      letter-spacing: 0.3px;
    }

    .menu-arrow {
      margin-left: auto;
      color: var(--text3);
      font-size: 20px;
      font-weight: 300;
      transition: all 0.25s cubic-bezier(0.2, 0.8, 0.2, 1);
      transform: translateX(0);
    }

    .menu-item:hover .menu-arrow {
      color: var(--amber);
      transform: translateX(4px);
    }

    .footer {
      font-family: 'JetBrains Mono', monospace;
      font-size: 11px;
      font-weight: 500;
      letter-spacing: 3px;
      color: var(--text3);
      margin-top: 20px;
      text-transform: uppercase;
      position: relative;
    }

    /* view toggle */
    .view-toggle {
      position: fixed;
      bottom: 24px;
      right: 24px;
      z-index: 100;
      width: 40px;
      height: 40px;
      border-radius: 8px;
      border: 1px solid var(--border);
      background: var(--surface2);
      color: var(--text2);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.25s cubic-bezier(0.2, 0.8, 0.2, 1);
    }

    .view-toggle:hover {
      border-color: var(--amber);
      color: var(--amber);
      background: var(--surface);
      transform: translateY(-2px);
      box-shadow: 0 4px 16px rgba(0, 0, 0, 0.3);
    }

    .view-toggle:active {
      transform: translateY(0);
    }

    .view-toggle svg {
      width: 18px;
      height: 18px;
      fill: currentColor;
      transition: transform 0.2s;
    }

    .view-toggle:hover svg {
      transform: scale(1.1);
    }
  </style>
</head>

<body>

  <div class="container">
    <div class="title">COMPOSITION LAB</div>
    <div class="title-desc">Sonic architecture & harmonic geometry</div>

    <nav class="menu">
      <a class="menu-item" href="tonnetz.html" id="linkTonnetz">
        <div class="menu-icon">
          <svg viewBox="0 0 24 24">
            <path d="M12 2L2 19h20L12 2zm0 4l7 12H5l7-12z" />
          </svg>
        </div>
        <div class="menu-text-block">
          <span class="menu-label">TONNETZ ROW</span>
          <span class="menu-desc">Tone rows from harmonic geometry</span>
        </div>
        <span class="menu-arrow">›</span>
      </a>

      <a class="menu-item" href="morse.html" id="linkMorse">
        <div class="menu-icon">·—</div>
        <div class="menu-text-block">
          <span class="menu-label">MORSE SEQ</span>
          <span class="menu-desc">Rhythmic patterns from text</span>
        </div>
        <span class="menu-arrow">›</span>
      </a>

      <a class="menu-item" href="braille.html" id="linkBraille">
        <div class="menu-icon">⠿</div>
        <div class="menu-text-block">
          <span class="menu-label">SONIC BRAILLE</span>
          <span class="menu-desc">Pitch sequences from Braille cells</span>
        </div>
        <span class="menu-arrow">›</span>
      </a>
    </nav>

    <div class="footer">EDMUND SONG</div>
  </div>

  <button class="view-toggle" id="viewToggle" title="Toggle mobile/desktop view">
    <svg id="icoPhone" viewBox="0 0 24 24">
      <path d="M7 1h10a2 2 0 012 2v18a2 2 0 01-2 2H7a2 2 0 01-2-2V3a2 2 0 012-2zm0 2v14h10V3H7zm3 16h4v1h-4v-1z" />
    </svg>
    <svg id="icoDesktop" viewBox="0 0 24 24" style="display:none">
      <path d="M3 4h18a1 1 0 011 1v11a1 1 0 01-1 1H3a1 1 0 01-1-1V5a1 1 0 011-1zm1 2v9h16V6H4zm4 13h8v1H8v-1z" />
    </svg>
  </button>

  <script>
    // View preference: auto, mobile, or desktop
    const params = new URLSearchParams(window.location.search);
    let viewPref = params.get('view') || 'auto';
    const isMobile = window.innerWidth <= 768;

    function updateToggleIcon() {
      const showingMobile = viewPref === 'mobile' || (viewPref === 'auto' && isMobile);
      document.getElementById('icoPhone').style.display = showingMobile ? 'block' : 'none';
      document.getElementById('icoDesktop').style.display = showingMobile ? 'none' : 'block';
    }

    function updateLinks() {
      const suffix = viewPref === 'auto' ? '' : '?view=' + viewPref;
      document.getElementById('linkTonnetz').href = 'tonnetz.html' + suffix;
      document.getElementById('linkMorse').href = 'morse.html' + suffix;
      document.getElementById('linkBraille').href = 'braille.html' + suffix;
    }

    document.getElementById('viewToggle').onclick = () => {
      const currentlyMobile = viewPref === 'mobile' || (viewPref === 'auto' && isMobile);
      viewPref = currentlyMobile ? 'desktop' : 'mobile';
      updateToggleIcon();
      updateLinks();
    };

    updateToggleIcon();
    updateLinks();
  </script>

</body>

</html>
